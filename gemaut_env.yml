name: gemaut_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python>=3.8
  - numpy
  - scipy
  - rasterio
  - gdal
  - tqdm
  - loguru
  - cmake
  - make
  - cxx-compiler
  - git
  - pdal
  - python-pdal
  - wxwidgets
  - proj
  - geos
  - sqlite
  - libgdal
  - hdf5
  - eigen
  - suitesparse
  - tbb-devel
  - pkg-config
  # OpenCV 5 supprime l'API C legacy ; GEMO utilise l'API C++ moderne (compatible 4.x)
  - libopencv>=4.5,<5
  - opencv>=4.5,<5
  - py-opencv>=4.5,<5
  - gsl
  - pip
